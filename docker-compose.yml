name: ${COMPOSE_PROJECT_NAME:-lunaeclaw}

x-lunaeclaw-common: &lunaeclaw-common
  build:
    context: .
    dockerfile: Dockerfile
  init: true
  restart: unless-stopped
  working_dir: /app
  environment: &lunaeclaw-env
    LUNAECLAW_DATA_DIR: /root/.lunaeclaw
    LUNAECLAW_WEBUI_PATH_TOKEN: ${LUNAECLAW_WEBUI_PATH_TOKEN:-}
    SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
    CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  volumes:
    # Host runtime data dir (config/env/runtime/token/session).
    # Default is repo-local ./.lunaeclaw-data to keep deployment self-contained.
    # Host override: LUNAECLAW_HOST_DATA_DIR (fallback: legacy LUNAECLAW_DATA_DIR).
    - type: bind
      source: ${LUNAECLAW_HOST_DATA_DIR:-${LUNAECLAW_DATA_DIR:-./.lunaeclaw-data}}
      target: /root/.lunaeclaw

services:
  lunaeclaw-gateway:
    <<: *lunaeclaw-common
    image: lunaeclaw-gateway:local
    command: ["gateway", "--port", "${GATEWAY_PORT:-18790}"]
    ports:
      - "${GATEWAY_PORT:-18790}:${GATEWAY_PORT:-18790}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json,sys,pathlib; p=pathlib.Path('/root/.lunaeclaw/runtime/gateway.state.json'); s=(json.loads(p.read_text(encoding='utf-8')).get('status') if p.exists() else ''); sys.exit(0 if s in ('running','waiting_config') else 1)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  lunaeclaw-webui:
    <<: *lunaeclaw-common
    image: lunaeclaw-webui:local
    command: ["webui", "--host", "0.0.0.0", "--port", "${WEBUI_PORT:-18791}"]
    depends_on:
      lunaeclaw-gateway:
        condition: service_started
    ports:
      - "${WEBUI_PORT:-18791}:${WEBUI_PORT:-18791}"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:${WEBUI_PORT:-18791}/healthz >/dev/null
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  lunaeclaw-cli:
    <<: *lunaeclaw-common
    image: lunaeclaw-cli:local
    profiles:
      - cli
    restart: "no"
    command: ["status"]
    stdin_open: true
    tty: true
